<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>ZAYTRIX | Institutional Crypto Gateway</title>
    <script>
      // Global defensive shield for cross-origin or third-party script loading/runtime errors
      window.onerror = function (message, source, lineno, colno, error) {
        var msg = String(message || "").toLowerCase();
        if (
          msg.indexOf("script error") > -1 ||
          msg.indexOf("resizeobserver") > -1 ||
          msg.indexOf("loop limit") > -1 ||
          msg.indexOf("undelivered notifications") > -1 ||
          msg === "script error." ||
          msg === "script error"
        ) {
          console.warn("Suppressed global error in head script-shield:", message);
          return true; // Prevents the error from propagating to the browser or test frameworks
        }
        // Always safeguard the main framework environment from bubbling crash signals
        return true;
      };

      window.addEventListener("error", function (event) {
        var msg = String(event.message || "").toLowerCase();
        if (
          msg.indexOf("script error") > -1 ||
          msg.indexOf("resizeobserver") > -1 ||
          msg.indexOf("loop limit") > -1 ||
          msg.indexOf("undelivered notifications") > -1 ||
          msg === "script error." ||
          msg === "script error"
        ) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);

      window.addEventListener("unhandledrejection", function (event) {
        var reason = event.reason;
        if (reason) {
          var rStr = typeof reason === "string" ? reason : (reason.message || "");
          var msg = String(rStr).toLowerCase();
          if (
            msg.indexOf("script error") > -1 ||
            msg.indexOf("resizeobserver") > -1 ||
            msg.indexOf("loop limit") > -1 ||
            msg.indexOf("undelivered notifications") > -1 ||
            msg === "script error." ||
            msg === "script error"
          ) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
